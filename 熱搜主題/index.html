<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        熱搜主題
    </title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="/css/image-container.css">
    <link rel="stylesheet" href="/css/product.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body data-config="hot">
    <div class="navbar">
        <a href="/" class="logo">
            Logo
        </a>
    </div>
    <div class="image-container">
        <button class="button prev" onclick="prevImage()">
            &#10094;
        </button>
        <img id="slideshow" src="/img/hot/1.png" alt="Image Slideshow">
        <button class="button next" onclick="nextImage()">
            &#10095;
        </button>
    </div>
    <div class="product-container" id="product-container"></div>
    <div class="pagination">
        <button class="page-button prev">  <!-- 加入 prev class -->
            上一頁
        </button>
        <button class="page-button next">  <!-- 加入 next class -->
            下一頁
        </button>
    </div>
    <footer>
        <p>
            版權所有 &copy; 2024
        </p>
    </footer>
    <script src="/js/image-container.js"></script>
    <script src="/js/product.js"></script>

</body>
</html>
